<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern Chat Application</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .message-appear {
        animation: slideIn 0.3s ease-out;
      }
      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body class="bg-gray-100 h-screen overflow-hidden">
    <!-- Loading Overlay -->
    <div
      id="loading-overlay"
      class="fixed inset-0 bg-gray-900 bg-opacity-50 flex items-center justify-center z-50"
    >
      <div class="bg-white p-6 rounded-lg shadow-xl">
        <div class="mb-4">Please enter your username to join the chat</div>
        <input
          type="text"
          id="username-input"
          class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="Enter username"
        />
        <button
          id="join-chat"
          class="mt-4 w-full bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600"
        >
          Join Chat
        </button>
      </div>
    </div>

    <div class="flex h-screen">
      <!-- Sidebar -->
      <div class="w-64 bg-gray-800 text-white flex flex-col">
        <!-- User Profile Section -->
        <div class="p-4 border-b border-gray-700">
          <div class="flex items-center space-x-3 mb-4">
            <img
              id="current-avatar"
              src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=150&h=150&fit=crop"
              class="w-10 h-10 rounded-full cursor-pointer border-2 border-gray-600 hover:border-blue-500 transition-colors"
            />
            <div class="flex-1">
              <div id="username-display" class="text-white font-semibold"></div>
            </div>
          </div>
          <div
            id="avatar-selector"
            class="hidden bg-gray-700 p-3 rounded-lg mt-2"
          >
            <div class="grid grid-cols-4 gap-2 mb-2" id="predefined-avatars">
              <!-- Predefined avatars will be inserted here -->
            </div>
            <button
              id="upload-avatar-btn"
              class="w-full bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 transition-colors"
            >
              Upload Avatar
            </button>
            <input
              type="file"
              id="avatar-file-input"
              class="hidden"
              accept="image/*"
            />
          </div>
        </div>

        <!-- Channels Section -->
        <div class="flex-1 overflow-y-auto scrollbar-hide">
          <div class="p-4">
            <div class="flex items-center justify-between mb-4">
              <h2 class="text-lg font-semibold">Channels</h2>
              <button
                id="new-channel"
                class="text-sm bg-blue-500 hover:bg-blue-600 px-2 py-1 rounded transition-colors"
              >
                <i class="fas fa-plus mr-1"></i>New
              </button>
            </div>
            <div id="channels" class="space-y-1">
              <!-- Channels will be inserted here -->
            </div>
          </div>

          <!-- Online Users Section -->
          <div class="p-4">
            <h2 class="text-lg font-semibold mb-4">Online Users</h2>
            <div id="users" class="space-y-2">
              <!-- Online users will be inserted here -->
            </div>
          </div>
        </div>
      </div>

      <!-- Main Chat Area -->
      <div class="flex-1 flex flex-col bg-white">
        <!-- Chat Header -->
        <div class="bg-white shadow-sm p-4 flex items-center border-b">
          <div>
            <h1 id="current-channel" class="text-xl font-semibold">#general</h1>
            <p id="channel-description" class="text-sm text-gray-500">
              General discussion channel
            </p>
          </div>
          <div class="ml-auto">
            <span id="online-count" class="text-sm text-gray-500">
              <button class="onlineusers">
                <i class="fas fa-users mr-1"></i>
              </button>
              <span>0 online</span>
            </span>
          </div>
        </div>

        <!-- Messages Area -->
        <div
          class="flex-1 overflow-y-auto p-4 scrollbar-hide"
          id="messages-container"
        >
          <ul id="messages" class="space-y-4">
            <!-- Messages will be inserted here -->
          </ul>
          <div
            id="typing-indicator"
            class="text-sm text-gray-500 italic mt-2"
          ></div>
        </div>

        <!-- Message Input Area -->
        <div class="border-t p-4">
          <form id="form" class="flex items-center space-x-4">
            <div class="flex-1 relative">
              <input
                type="text"
                id="input"
                class="w-full px-4 py-2 border rounded-full focus:outline-none focus:ring-2 focus:ring-blue-500"
                placeholder="Type a message..."
              />
            </div>
            <button
              type="submit"
              class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-2 rounded-full transition-colors flex items-center"
            >
              <i class="fas fa-paper-plane mr-2"></i>
              Send
            </button>
          </form>
        </div>
      </div>
    </div>

    <!-- Error Toast -->
    <div
      id="error-toast"
      class="hidden fixed top-4 right-4 bg-red-500 text-white px-4 py-2 rounded shadow-lg"
    ></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      let counter = 0;
      let username = "";
      let currentChannel = "general";
      let typingTimeout;
      let socket;

      // Predefined avatars from Unsplash
      const predefinedAvatars = [
        "https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=150&h=150&fit=crop",
        "https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=150&h=150&fit=crop",
        "https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=150&h=150&fit=crop",
        "https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=150&h=150&fit=crop",
        "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=150&h=150&fit=crop",
        "https://images.unsplash.com/photo-1527980965255-d3b416303d12?w=150&h=150&fit=crop",
        "https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=150&h=150&fit=crop",
        "https://images.unsplash.com/photo-1554151228-14d9def656e4?w=150&h=150&fit=crop",
      ];

      // DOM Elements
      const loadingOverlay = document.getElementById("loading-overlay");
      const onlineusers = document.getElementById("onlineusers");
      const usernameInput = document.getElementById("username-input");
      const joinChatButton = document.getElementById("join-chat");
      const form = document.getElementById("form");
      const input = document.getElementById("input");
      const messages = document.getElementById("messages");
      const typingIndicator = document.getElementById("typing-indicator");
      const avatarImg = document.getElementById("current-avatar");
      const avatarSelector = document.getElementById("avatar-selector");
      const onlineCount = document.getElementById("online-count");
      const currentChannelHeader = document.getElementById("current-channel");
      const channelDescription = document.getElementById("channel-description");
      const messagesContainer = document.getElementById("messages-container");
      const usernameDisplay = document.getElementById("username-display");
      const errorToast = document.getElementById("error-toast");

      const uploadAvatarBtn = document.getElementById("upload-avatar-btn");
      const avatarFileInput = document.getElementById("avatar-file-input");

      // Initialize socket connection with username
      joinChatButton.addEventListener("click", () => {
        username = usernameInput.value.trim();
        if (username) {
          initializeSocket();
          loadingOverlay.classList.add("hidden");
          usernameDisplay.textContent = username;
        } else {
          showError("Username is required");
        }
      });

      usernameInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          joinChatButton.click();
        }
      });

      // add event users list

      function initializeSocket() {
        socket = io({
          auth: {
            username,
            avatar: avatarImg.src,
          },
        });

        // Socket event handlers
        socket.on("connect", () => {
          socket.emit("set username", username);
          showError("Connected to server", "bg-green-500");
        });

        // More of that avatar restoring action
        socket.on("restore avatar", (avatarUrl) => {
          avatarImg.src = avatarUrl; // Update the avatar image on the top-left
        });


        socket.on("error", showError);

        socket.on("chat message", (message, serverOffset) => {
          if (
            message.username !== username ||
            message.content.startsWith("@")
          ) {
            appendMessage(message);
          } else {
            appendMessage(message);
          }
          if (socket.auth) {
            socket.auth.serverOffset = serverOffset;
          }
        });

        socket.on("typing", (data) => {
          if (data.channel === currentChannel && data.username !== username) {
            typingIndicator.textContent = `${data.username} is typing...`;
          }
        });

        socket.on("stop typing", (data) => {
          if (data.channel === currentChannel) {
            typingIndicator.textContent = "";
          }
        });

        socket.on("user connected", (user) => {
          appendNotification(`${user} joined the chat`);
        });

        socket.on("user disconnected", (user) => {
          appendNotification(`${user} left the chat`);
        });

        socket.on("away", (user) => {
          appendNotification(`${user} is away from keyboard`);
        });

        socket.on("back", (user) => {
          appendNotification(`${user} is back to the keyboard`);
        });

        socket.on("update users", (users) => {
          updateUsersList(users);
        });

        socket.on("update channels", (channels) => {
          updateChannelsList(channels);
        });

        // Initialize event listeners
        initializeEventListeners();
      }

      function test(){
        uploadAvatarBtn.addEventListener("click", () => {
          avatarFileInput.click();
        });

        avatarFileInput.addEventListener("change", (e) => {
          handleAvatarUpload(e.target.files[0]);
        });
      }

      function initializeEventListeners() {
        // Avatar selection
        avatarImg.addEventListener("click", () => {
          avatarSelector.classList.toggle("hidden");
          test();
        });

        // Message input
        input.addEventListener("input", () => {
          socket.emit("typing", currentChannel);
          clearTimeout(typingTimeout);
          typingTimeout = setTimeout(() => {
            socket.emit("stop typing", currentChannel);
          }, 1000);
        });

        // Message form submission
        form.addEventListener("submit", (e) => {
          e.preventDefault();
          if (input.value.trim()) {
            const clientOffset = `${socket.id}-${counter++}`;
            const message = {
              content: input.value,
              channel: currentChannel,
              username,
              avatar: avatarImg.src,
              timestamp: new Date().toISOString(),
            };
            socket.emit("chat message", message, `${socket.id}-${counter++}`);
            input.value = "";
          }
        });

        // Initialize predefined avatars
        const predefinedAvatarsContainer =
          document.getElementById("predefined-avatars");
        predefinedAvatars.forEach((avatarSrc) => {
          const img = document.createElement("img");
          img.src = avatarSrc;
          img.className =
            "w-10 h-10 rounded-full cursor-pointer hover:ring-2 hover:ring-blue-500 transition-all";
          img.onclick = () => {
            avatarImg.src = avatarSrc;
            socket.emit("set avatar", avatarSrc);
            avatarSelector.classList.add("hidden");
          };
          predefinedAvatarsContainer.appendChild(img);
        });

        // New channel creation
        document.getElementById("new-channel").onclick = () => {
          const channelName = prompt("Enter channel name:");
          if (channelName?.trim()) {
            const sanitizedName = channelName
              .toLowerCase()
              .replace(/[^a-z0-9-]/g, "-");
            socket.emit("create channel", {
              name: sanitizedName,
              isPrivate: false,
              description: `Channel for ${channelName} discussions`,
            });
          }
        };

        // Click outside avatar selector
        document.addEventListener("click", (e) => {
          if (!avatarSelector.contains(e.target) && e.target !== avatarImg) {
            avatarSelector.classList.add("hidden");
          }
        });
      }

      async function handleAvatarUpload(file) {
        if (!file) return;

        const formData = new FormData();
        formData.append("avatar", file);

        try {
          const response = await fetch("/upload-avatar", {
            method: "POST",
            body: formData,
          });

          if (!response.ok) throw new Error("Failed to upload avatar");

          const { url } = await response.json();

          // Update avatar
          avatarImg.src = url;
          socket.emit("set avatar", url); // Notify server
          avatarSelector.classList.add("hidden"); // Hide the selector
        } catch (err) {
          showError("Failed to upload avatar: " + err.message);
        }
      }

      function appendMessage(message) {
        const messageElement = document.createElement("li");
        messageElement.className = "flex space-x-3 message-appear";

        const timestamp = new Date(message.timestamp).toLocaleTimeString();

        messageElement.innerHTML = `
                <img src="${message.avatar}" class="w-10 h-10 rounded-full">
                <div class="flex-1">
                    <div class="flex items-baseline space-x-2">
                        <span class="font-semibold">${message.username}</span>
                        <span class="text-xs text-gray-500">${timestamp}</span>
                    </div>
                    <p class="text-gray-800 mt-1">${message.content}</p>
                </div>
            `;

        messages.appendChild(messageElement);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
      }

      function appendNotification(text) {
        const notificationElement = document.createElement("li");
        notificationElement.className =
          "text-center text-sm text-gray-500 my-2 message-appear";
        notificationElement.textContent = text;
        messages.appendChild(notificationElement);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
      }

      function updateUsersList(users) {
        const usersDiv = document.getElementById("users");
        const onlineCountSpan = document.getElementById("online-count");
        usersDiv.innerHTML = "";

        // Clear existing users
        while (usersDiv.firstChild) {
          usersDiv.removeChild(usersDiv.firstChild);
        }

        // Update online count
        onlineCountSpan.textContent = `${users.length} online`;

        // Sort users alphabetically by username
        users.sort((a, b) => a.username.localeCompare(b.username));

        // Create user elements
        users.forEach((user) => {
          const userElement = document.createElement("div");
          userElement.className =
            "flex items-center space-x-2 p-2 rounded hover:bg-gray-700 cursor-pointer transition-colors";

          // Status indicator color based on user status
          const statusColor =
            user.status === "away" ? "bg-yellow-500" : "bg-green-500";

          userElement.innerHTML = `
      <img src="${user.avatar}" class="w-8 h-8 rounded-full">
      <span class="flex-1">${user.username}</span>
      <span class="w-2 h-2 ${statusColor} rounded-full"></span>
    `;

          // Add click handler for private messaging
          userElement.onclick = () => {
            if (user.username !== username) {
              // Don't allow messaging yourself
              startPrivateChat(user.username);
            }
          };

          usersDiv.appendChild(userElement);
        });
      }

      function updateChannelsList(channels) {
        const channelsDiv = document.getElementById("channels");
        channelsDiv.innerHTML = "";

        channels.forEach((channel) => {
          const channelElement = document.createElement("div");
          const isActive = channel.name === currentChannel;

          channelElement.className = `flex items-center space-x-2 p-2 rounded hover:bg-gray-700 cursor-pointer transition-colors${
            isActive ? " bg-gray-700" : ""
          }`;

          channelElement.innerHTML = `
            <span class="text-gray-400">#</span>
            <span class="flex-1">${channel.name}</span>
        `;

          channelElement.onclick = () => {
            // Remove active class from all channels
            const allChannels = channelsDiv.querySelectorAll("div");
            allChannels.forEach((ch) => ch.classList.remove("bg-gray-700"));

            // Add active class to clicked channel
            channelElement.classList.add("bg-gray-700");

            joinChannel(channel.name);
          };

          channelsDiv.appendChild(channelElement);
        });
      }
      function startPrivateChat(targetUsername) {
        if (targetUsername !== username) {
          input.value = `@${targetUsername} `;
          input.focus();
        }
      }

      function joinChannel(channel) {
        currentChannel = channel;
        currentChannelHeader.textContent = `#${channel}`;
        channelDescription.textContent = `Channel for ${channel} discussions`;
        socket.emit("join channel", channel);
        messages.innerHTML = "";

        // Add loading indicator
        appendNotification("Loading messages...");
      }

      function showError(message, bgColor = "bg-red-500") {
        errorToast.textContent = message;
        errorToast.className = `fixed top-4 right-4 ${bgColor} text-white px-4 py-2 rounded shadow-lg z-50`;
        errorToast.classList.remove("hidden");

        setTimeout(() => {
          errorToast.classList.add("hidden");
        }, 3000);
      }

      // Handle page visibility
      document.addEventListener("visibilitychange", () => {
        if (socket && username) {
          if (document.hidden) {
            socket.emit("away");
          } else if (document.visibilityState === "visible") {
            socket.emit("back");
          }
        }
      });

      // Prevent accidental page refresh/close
      window.addEventListener("beforeunload", (e) => {
        if (socket && socket.connected) {
          e.preventDefault();
          e.returnValue = "";
        }
      });

      // Initialize tooltips for UI elements
      const tooltipElements = document.querySelectorAll("[data-tooltip]");
      tooltipElements.forEach((element) => {
        element.addEventListener("mouseenter", (e) => {
          const tooltip = document.createElement("div");
          tooltip.className =
            "absolute bg-gray-900 text-white text-xs px-2 py-1 rounded -top-8 left-1/2 transform -translate-x-1/2";
          tooltip.textContent = e.target.dataset.tooltip;
          e.target.appendChild(tooltip);
        });

        element.addEventListener("mouseleave", (e) => {
          const tooltip = e.target.querySelector("div");
          if (tooltip) tooltip.remove();
        });
      });

      // Focus username input on page load
      window.onload = () => {
        usernameInput.focus();
      };
    </script>
  </body>
</html>
